name: Build and Release S1MPLE Performance Client

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Fabric Mod
        run: ./gradlew build --no-daemon

      - name: Rename JAR
        run: |
          cd build/libs
          JAR_NAME=$(ls S1MPLEPerformance-Client-*.jar)
          mv "$JAR_NAME" "S1MPLEPerformance-Client-${{ github.event.inputs.version || '1.0.0' }}.jar"

      - name: Get JAR size
        run: |
          JAR_NAME="S1MPLEPerformance-Client-${{ github.event.inputs.version || '1.0.0' }}.jar"
          SIZE=$(du -h "build/libs/$JAR_NAME" | cut -f1)
          echo "JAR_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/libs/S1MPLEPerformance-Client-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-legacy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Fabric Mod
        run: ./gradlew build --no-daemon

      - name: Rename and Upload
        run: |
          cd build/libs
          JAR_NAME=$(ls *.jar)
          mv "$JAR_NAME" "S1MPLEPerformance-Client-${{ github.event.inputs.version }}.jar"
          echo "Upload complete: $JAR_NAME"